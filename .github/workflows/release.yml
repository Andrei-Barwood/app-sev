name: Build Desktop Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            archive: app-sev-macos.zip
          - os: windows-latest
            platform: windows
            archive: app-sev-windows.zip
          - os: ubuntu-latest
            platform: linux
            archive: app-sev-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build desktop app
        shell: bash
        run: bash scripts/build_desktop.sh ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/release/${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Package browser extension
        run: |
          cd browser_extension
          zip -r ../artifacts/release_extension_${GITHUB_REF_NAME}.zip .

      - name: Prepare patch release notes
        if: github.ref_name == 'v1.1.1'
        run: |
          {
            echo '## Patch exclusivo para usuarios de v1.1 (Windows)'
            echo ''
            echo 'Este release corrige únicamente el paquete `app-sev-windows.zip` de la versión **v1.1**, que se publicó sin el script `setup_windows.ps1`.'
            echo ''
            echo '### Qué incluye'
            echo '- `app-sev-windows.zip` actualizado con `AppSEV.exe` + `setup_windows.ps1`'
            echo '- Binarios de macOS y Linux (sin cambios funcionales respecto a v1.1)'
            echo '- Extensión de navegador actualizada'
            echo ''
            echo '### Instrucciones'
            echo '1. Descarga `app-sev-windows.zip` de este release.'
            echo '2. Ejecuta **antes** de abrir la app:'
            echo '   ```powershell'
            echo '   powershell -ExecutionPolicy Bypass -File .\setup_windows.ps1'
            echo '   ```'
            echo '3. Abre `AppSEV.exe`.'
            echo ''
            echo '### ¿Necesito este patch?'
            echo '- **Sí**, si instalaste el binario standalone de **v1.1** en Windows.'
            echo '- **No**, a partir de **v1.2** el script ya viene incluido en el zip de Windows y no hace falta descargar este patch.'
            echo ''
            echo '**Full Changelog**: https://github.com/Andrei-Barwood/app-sev/compare/v1.1...v1.1.1'
          } > release_notes.md

      - name: Create GitHub Release (patch v1.1.1)
        if: github.ref_name == 'v1.1.1'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: v1.1.1 — Patch Windows (preconfiguración)
          body_path: release_notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release notes (v1.2.0)
        if: github.ref_name == 'v1.2.0'
        run: cp docs/release_notes_v1.2.0.md release_notes.md

      - name: Prepare release notes (v1.2.1)
        if: github.ref_name == 'v1.2.1'
        run: cp docs/release_notes_v1.2.1.md release_notes.md

      - name: Prepare release notes (v1.2.2)
        if: github.ref_name == 'v1.2.2'
        run: cp docs/release_notes_v1.2.2.md release_notes.md

      - name: Create GitHub Release (v1.2.2)
        if: github.ref_name == 'v1.2.2'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: v1.2.2 — Dataset único para gráficos y optimización SEV
          body_path: release_notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (v1.2.1)
        if: github.ref_name == 'v1.2.1'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: v1.2.1 — Corrección modelo de capas y botones SEV
          body_path: release_notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (v1.2.0)
        if: github.ref_name == 'v1.2.0'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: v1.2.0 — Importación SEV, optimización y exportación AutoCAD
          body_path: release_notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref_name != 'v1.1.1' && github.ref_name != 'v1.2.0' && github.ref_name != 'v1.2.1' && github.ref_name != 'v1.2.2'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}